apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: my-eks-cluster
  region: us-east-1
  version: "1.29"
  tags:
    environment: development
    project: eks-setup

iam:
  withOIDC: true
  serviceAccounts:
    - metadata:
        name: fluent-bit
        namespace: amazon-cloudwatch
        labels:
          app.kubernetes.io/name: fluent-bit
      attachPolicyARNs:
        - arn:aws:iam::policy/CloudWatchAgentServerPolicy
      roleName: eks-fluent-bit-role
    - metadata:
        name: cloudwatch-agent
        namespace: amazon-cloudwatch
        labels:
          app.kubernetes.io/name: cloudwatch-agent
      attachPolicyARNs:
        - arn:aws:iam::policy/CloudWatchAgentServerPolicy
      roleName: eks-cloudwatch-agent-role

vpc:
  cidr: 10.0.0.0/16
  nat:
    gateway: Single
  clusterEndpoints:
    publicAccess: true
    privateAccess: true

availabilityZones:
  - us-east-1a
  - us-east-1b
  - us-east-1c

managedNodeGroups:
  - name: ng-standard
    instanceType: t3.medium
    desiredCapacity: 2
    minSize: 1
    maxSize: 4
    volumeSize: 30
    volumeType: gp3
    labels:
      role: worker
    tags:
      nodegroup-role: worker
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
        ebs: true
    privateNetworking: true

  - name: ng-spot
    instanceTypes:
      - t3.medium
      - t3.large
      - t3a.medium
    spot: true
    desiredCapacity: 2
    minSize: 0
    maxSize: 6
    volumeSize: 30
    volumeType: gp3
    labels:
      role: spot-worker
    tags:
      nodegroup-role: spot-worker
    iam:
      withAddonPolicies:
        autoScaler: true
        cloudWatch: true
        ebs: true
    privateNetworking: true

cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
    logRetentionInDays: 30

addons:
  - name: vpc-cni
    attachPolicyARNs:
      - arn:aws:iam::policy/AmazonEKS_CNI_Policy
  - name: coredns
  - name: kube-proxy
  - name: aws-ebs-csi-driver
    wellKnownPolicies:
      ebsCSIController: true
  - name: amazon-cloudwatch-observability
    attachPolicyARNs:
      - arn:aws:iam::policy/CloudWatchAgentServerPolicy
      - arn:aws:iam::policy/AWSXrayWriteOnlyAccess
